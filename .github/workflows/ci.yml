name: CI

on:
  push:
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Generate Core Project Files
        shell: pwsh
        run: python scripts/Setup.py --module-profile core --skip-lfs

      - name: Build Core Profile
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
          if (-not $msbuild) {
            throw 'MSBuild.exe not found via vswhere.'
          }
          # Build the .vcxproj directly. Using `Index.sln /t:Index-Engine` is
          # broken with MSBuild 16.10+: the solution metaproj forwards the
          # `Index-Engine` target name to every dependency project (Tracy, GLFW,
          # Box2D, ...), which fails with MSB4057 because those projects only
          # define the standard `Build` target. ProjectReference entries in the
          # .vcxproj already cover the dependency graph.
          & $msbuild "Index-Engine\Index-Engine.vcxproj" /m /p:Configuration=Release /p:Platform=x64
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Generate Project Files
        shell: pwsh
        run: python scripts/Setup.py

      - name: Restore .NET dependencies
        shell: pwsh
        run: dotnet restore Index.sln

      - name: Build Package Tool
        shell: pwsh
        run: |
          dotnet restore Index-PackageTool/Index-PackageTool.csproj
          dotnet build Index-PackageTool/Index-PackageTool.csproj --configuration Release --no-restore

      - name: Build Solution
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
          if (-not $msbuild) {
            throw 'MSBuild.exe not found via vswhere.'
          }
          $pathValue = $env:PATH

          @"
          set "PATH=$pathValue"
          "$msbuild" "Index.sln" /m /p:Configuration=Release /p:Platform=x64
          if errorlevel 1 exit /b %errorlevel%
          "@ | cmd /Q

      - name: Windows Engine Tests
        shell: pwsh
        run: scripts/RunTests.bat --release

      - name: Windows Runtime Smoke Test
        shell: pwsh
        run: python scripts/ci/runtime_smoke_test.py --binary bin/Release-windows-x86_64/Index-Runtime/Index-Runtime.exe

  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Native Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libglu1-mesa-dev xvfb

      - name: Install Premake
        run: |
          # vendor/bin/ only contains premake5.exe (Windows) in the repo.
          # Fetch the matching Linux binary so Setup.sh can find it via the
          # vendored path the same way the Windows job does.
          PREMAKE_VERSION="5.0.0-beta5"
          URL="https://github.com/premake/premake-core/releases/download/v${PREMAKE_VERSION}/premake-${PREMAKE_VERSION}-linux.tar.gz"
          mkdir -p vendor/bin
          curl -fsSL "$URL" | tar -xz -C vendor/bin premake5
          chmod +x vendor/bin/premake5
          vendor/bin/premake5 --version

      - name: Generate Core Makefiles
        run: |
          chmod +x scripts/Setup.sh
          chmod +x vendor/bin/premake5 || true
          ./scripts/Setup.sh --module-profile core --skip-lfs

      - name: Build Core Profile
        run: make config=release -j"$(nproc)" Index-Engine

      - name: Generate Makefiles
        run: |
          chmod +x scripts/Setup.sh
          chmod +x vendor/bin/premake5 || true
          ./scripts/Setup.sh

      - name: Build Linux Targets
        run: make config=release -j"$(nproc)" Index-Engine Index-Runtime Index-Editor

      - name: Linux Engine Tests
        run: |
          make config=release -j"$(nproc)" Index-Engine-Tests
          ./bin/Release-linux-x86_64/Index-Engine-Tests/Index-Engine-Tests

      - name: Build Linux Debug Targets
        run: make config=debug -j"$(nproc)" Index-Engine Index-Runtime Index-Editor

      - name: Linux Runtime Smoke Test
        run: python3 scripts/ci/runtime_smoke_test.py --binary bin/Release-linux-x86_64/Index-Runtime/Index-Runtime

      - name: Linux Debug Runtime Smoke Test
        run: python3 scripts/ci/runtime_smoke_test.py --binary bin/Debug-linux-x86_64/Index-Runtime/Index-Runtime
